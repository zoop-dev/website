<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07070a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>zoop has moved → zachy.cc</title>
    <meta name="description" content="zoop now lives at zachy.cc" />
    <link rel="canonical" href="https://zachy.cc/" />
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600&f[]=satoshi@400,500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      :root { --accent:#2bb8ff; }
      * { margin:0; padding:0; box-sizing:border-box; }
      body { min-height:100vh; background:#07070a; color:#ecebe6; font-family:'Satoshi',sans-serif;
        display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
        padding:2rem; overflow:hidden; position:relative; }
      .glow { position:fixed; inset:0; pointer-events:none;
        background:radial-gradient(60% 50% at 50% 42%, rgba(43,184,255,.16), transparent 70%); }
      .vignette { position:fixed; inset:0; pointer-events:none;
        background:radial-gradient(120% 120% at 50% 40%, transparent 55%, rgba(0,0,0,.6) 100%); }
      /* glass orb */
      .orb { width:160px; height:160px; border-radius:50%; margin-bottom:2.5rem; position:relative;
        background:
          radial-gradient(circle at 34% 27%, rgba(255,255,255,.95) 0%, rgba(255,255,255,0) 16%),
          radial-gradient(circle at 71% 79%, rgba(150,225,255,.85) 0%, rgba(150,225,255,0) 30%),
          radial-gradient(circle at 38% 34%, #2b4b64 0%, #0d2030 46%, #060d17 80%, #02060c 100%);
        box-shadow: inset -14px -16px 38px rgba(0,0,0,.7), inset 16px 18px 44px rgba(255,255,255,.06), 0 30px 80px rgba(43,184,255,.25);
        animation:float 5s ease-in-out infinite; }
      .orb::before { content:''; position:absolute; inset:0; border-radius:50%;
        background:radial-gradient(circle at 50% 50%, transparent 63%, rgba(150,225,255,.4) 88%, rgba(255,255,255,.8) 96%, transparent 100%); mix-blend-mode:screen; }
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
      .tag { font-family:'JetBrains Mono',monospace; font-size:.75rem; letter-spacing:.16em; text-transform:uppercase; color:#8a8a93; margin-bottom:1.2rem; }
      h1 { font-family:'Clash Display',sans-serif; font-weight:600; font-size:clamp(3rem,12vw,6rem); line-height:.9; letter-spacing:-.03em; }
      h1 span { color:var(--accent); font-style:italic; font-weight:500; }
      p.sub { color:#8a8a93; margin-top:1.2rem; max-width:34ch; line-height:1.5; }
      a.go { margin-top:2.4rem; display:inline-flex; align-items:center; gap:.6rem; text-decoration:none;
        font-family:'JetBrains Mono',monospace; font-size:.85rem; text-transform:uppercase; letter-spacing:.06em;
        color:#07070a; background:var(--accent); border-radius:100px; padding:.95em 1.8em; font-weight:700;
        box-shadow:0 10px 40px rgba(43,184,255,.4); transition:gap .3s, transform .3s; }
      a.go:hover { gap:1rem; transform:translateY(-2px); }
      .count { margin-top:1.6rem; font-family:'JetBrains Mono',monospace; font-size:.75rem; color:#4a4a52; letter-spacing:.06em; }
      ::selection { background:var(--accent); color:#07070a; }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <div class="vignette"></div>
    <div class="orb"></div>
    <div class="tag">zoop has a new home</div>
    <h1>we've <span>moved.</span></h1>
    <p class="sub">zoop now lives at a shiny new address. Update your bookmarks — taking you there now.</p>
    <a class="go" href="https://zachy.cc/" id="go">zachy.cc →</a>
    <div class="count">redirecting in <span id="n">5</span>s…</div>
    <script>
      var n = 5, el = document.getElementById('n');
      var t = setInterval(function () {
        n--; el.textContent = n;
        if (n <= 0) { clearInterval(t); location.replace('https://zachy.cc/'); }
      }, 1000);
    </script>
  </body>
</html>
